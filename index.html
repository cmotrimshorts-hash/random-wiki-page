<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Wiki Randomizer</title>
    <style>
        body, h1, div, button, select { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --main-bg: #f0f2f5;
            --box-bg: #ffffff;
            --txt: #1c1e21;
            --accent: #4a90e2;
            --btn-h: #357abd;
            --brd: #ccc;
        }

        body.dark-mode {
            --main-bg: #18191a;
            --box-bg: #242526;
            --txt: #e4e6eb;
            --accent: #2d88ff;
            --btn-h: #1a6ed8;
            --brd: #3e4042;
        }

        body {
            background-color: var(--main-bg);
            color: var(--txt);
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            height: 100vh;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .container {
            width: 90%;
            max-width: 450px;
            background: var(--box-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .lang-box select {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--brd);
            background: var(--box-bg);
            color: var(--txt);
            font-size: 14px;
            cursor: pointer;
            outline: none;
        }

        .lang-box option {
            background: var(--box-bg);
            color: var(--txt);
        }

        .content-area p {
            font-size: 1.1rem;
            margin-bottom: 30px;
            line-height: 1.5;
            opacity: 0.9;
        }

        .go-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }

        .go-btn:hover { background: var(--btn-h); transform: translateY(-1px); }
        .go-btn:active { transform: translateY(0); }

        .tgl-btn {
            cursor: pointer;
            background: none;
            border: none;
            font-size: 22px;
            color: var(--txt);
        }
    </style>
</head>
<body class="dark-mode">

<div class="container">
    <header>
        <div class="lang-box">
            <select id="langPicker">
                <option value="ru">Русский</option>
                <option value="en">English</option>
                <option value="de">Deutsch</option>
            </select>
        </div>
        <button class="tgl-btn" onclick="document.body.classList.toggle('dark-mode')">🌓</button>
    </header>

    <div class="content-area">
        <h1 style="margin-bottom: 15px;" id="mainTitle">Википедия</h1>
        <p id="mainText">Нажми на кнопку, чтобы открыть случайную статью в новой вкладке.</p>
        <button class="go-btn" id="actionBtn" onclick="goRandom()">Поехали!</button>
    </div>
</div>

<script>
    const langPicker = document.getElementById('langPicker');
    
    const phrases = {
        ru: { t: "Википедия", p: "Нажми на кнопку, чтобы открыть случайную статью в новой вкладке.", b: "Поехали!" },
        en: { t: "Wikipedia", p: "Click the button to open a random article in a new tab.", b: "Let's go!" },
        de: { t: "Wikipedia", p: "Klicken Sie auf die Schaltfläche, um einen zufälligen Artikel zu öffnen.", b: "Los geht's!" }
    };

    langPicker.onchange = () => {
        const l = langPicker.value;
        document.getElementById('mainTitle').innerText = phrases[l].t;
        document.getElementById('mainText').innerText = phrases[l].p;
        document.getElementById('actionBtn').innerText = phrases[l].b;
    };

    function goRandom() {
        const l = langPicker.value;
        window.open(`https://${l}.wikipedia.org/wiki/Special:Random`, '_blank');
    }
</script>

</body>
</html>
